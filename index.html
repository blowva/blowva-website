<script>
// Blowva drawer functions - loaded early
window.openDrawer = function() {
  var d = document.getElementById('drawer');
  var o = document.getElementById('drawer-overlay');
  if(d) d.classList.add('open');
  if(o) o.classList.add('open');
  document.body.style.overflow = 'hidden';
};
window.closeDrawer = function() {
  var d = document.getElementById('drawer');
  var o = document.getElementById('drawer-overlay');
  if(d) d.classList.remove('open');
  if(o) o.classList.remove('open');
  document.body.style.overflow = '';
};
window.closeMenu = function() { window.closeDrawer(); };
window.setTheme = function(mode) {
  if(mode === 'dark') {
    document.body.classList.add('dark');
    var bd = document.getElementById('btn-dark');
    var bl = document.getElementById('btn-light');
    if(bd) bd.classList.add('active');
    if(bl) bl.classList.remove('active');
    localStorage.setItem('blowva-theme','dark');
  } else {
    document.body.classList.remove('dark');
    var bd = document.getElementById('btn-dark');
    var bl = document.getElementById('btn-light');
    if(bd) bd.classList.remove('active');
    if(bl) bl.classList.add('active');
    localStorage.setItem('blowva-theme','light');
  }
};
document.addEventListener('DOMContentLoaded', function() {
  if(localStorage.getItem('blowva-theme')==='dark') window.setTheme('dark');
  document.addEventListener('keydown', function(e) { if(e.key==='Escape') window.closeDrawer(); });
});
</script>

<style>
/* Typewriter caret */
.tw-caret{display:inline-block;width:3px;background:var(--green);margin-left:4px;animation:twblink 1s step-end infinite;vertical-align:baseline;height:.85em;border-radius:2px;}
@keyframes twblink{50%{opacity:0}}
.hero h1{min-height:1.04em;}

/* Shimmer sweep on buttons */
.btn-green,.btn-outline,.nav-cta,.plan-btn{position:relative;overflow:hidden;}
.btn-green::after,.btn-outline::after,.nav-cta::after,.plan-btn::after{
  content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;
  background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.5) 50%,transparent 100%);
  transform:skewX(-22deg);transition:left .75s ease;pointer-events:none;
}
.btn-outline::after,.plan-btn:not(.featured-btn)::after{
  background:linear-gradient(120deg,transparent 0%,rgba(0,184,89,.28) 50%,transparent 100%);
}
.btn-green:hover::after,.btn-outline:hover::after,.nav-cta:hover::after,.plan-btn:hover::after{left:130%;}

/* Ripple click */
.bv-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.55);transform:scale(0);animation:bvrip .65s ease-out;pointer-events:none;}
.btn-outline .bv-ripple,.plan-btn:not(.featured-btn) .bv-ripple{background:rgba(0,184,89,.32);}
@keyframes bvrip{to{transform:scale(4);opacity:0}}

/* Scroll fade-up reveal */
.bv-reveal{opacity:0;transform:translateY(28px);transition:opacity .75s ease,transform .75s ease;}
.bv-reveal.in{opacity:1;transform:translateY(0);}
</style>

<script>
(function(){
  // 1. TYPEWRITER on hero h1
  var h1 = document.querySelector('.hero h1');
  if(h1){
    h1.innerHTML = '<span id="bv-tw"></span><span class="tw-caret"></span>';
    var el = document.getElementById('bv-tw');
    var full = 'Upload once. Blow up on every platform.';
    var i = 0;
    function tick(){
      if(i <= full.length){
        var t = full.slice(0, i);
        var html = t
          .replace('Blow up', '<span class="g">Blow up</span>')
          .replace('platform.', '<span class="light">platform.</span>');
        el.innerHTML = html;
        i++;
        setTimeout(tick, 55);
      }
    }
    setTimeout(tick, 450);
  }

  // 2. RIPPLE on every button
  document.querySelectorAll('button, .plan-btn, .nav-cta, .btn-green, .btn-outline').forEach(function(b){
    b.addEventListener('click', function(e){
      var r = document.createElement('span');
      r.className = 'bv-ripple';
      var d = Math.max(b.offsetWidth, b.offsetHeight);
      r.style.width = r.style.height = d + 'px';
      var rect = b.getBoundingClientRect();
      r.style.left = (e.clientX - rect.left - d/2) + 'px';
      r.style.top  = (e.clientY - rect.top  - d/2) + 'px';
      b.appendChild(r);
      setTimeout(function(){ r.remove(); }, 650);
    });
  });

  // 3. SCROLL FADE-UP on cards & steps
  var targets = document.querySelectorAll('.feat, .price-card, .testi, .step');
  targets.forEach(function(el){ el.classList.add('bv-reveal'); });
  if('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){
        if(e.isIntersecting){
          e.target.classList.add('in');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });
    targets.forEach(function(el){ io.observe(el); });
  } else {
    targets.forEach(function(el){ el.classList.add('in'); });
  }
})();
</script>

</body>
</html>
